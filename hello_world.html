<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #111;
    }

    h1, h2 {
      font-family: sans-serif;
      font-weight: 900;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    h1 { font-size: 10vw; }
    h2 { font-size: 5vw; }

    .cursive {
      font-family: 'Brush Script MT', cursive;
      font-weight: normal;
      font-size: 6vw;
      background: linear-gradient(135deg, #ff0080, #ff6600, #ffff00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
  <h2>Have a wonderful day</h2>
  <h2>In God We Trust</h2>
  <p class="cursive">goble goble goble</p>
</body>
</html>
